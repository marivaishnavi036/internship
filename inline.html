<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heading and Paragraph Example</title>
</head>
<style>
    body {
      background: rgb(102, 218, 164); /* default background */
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
</style>
<body>
  <h1 style="color:rgb(125, 1, 65);font-size:30px; text-align:center;">Inline CSS</h1>
  <p style="color:rgb(95, 4, 4); font-size:25px;">Think of inline CSS as a "post-it note" stuck directly onto an HTML element; it is an immediate, high-priority instruction that ignores the rest of your design rules to style that one specific spot instantly.</p>
</body>
</html>
